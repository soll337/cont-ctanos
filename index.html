<section id="contactanos">
    <style>
        #contactanos{
            max-width: 700px;
            margin: 40px auto;
            padding: 30px;
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-family: Arial, sans-serif;
        }

        #contactanos h2{
            text-align: center;
            color: #2e8b57;
            margin-bottom: 10px;
        }

        #contactanos p{
            text-align: center;
            color: #555;
        }

        #contactanos form{
            margin-top: 20px;
        }

        #contactanos input,
        #contactanos textarea{
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }

        #contactanos button{
            width: 100%;
            padding: 12px;
            background-color: #2e8b57;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        #contactanos button:hover{
            background-color: #246b45;
        }

        .info-contacto{
            margin-top: 25px;
            text-align: center;
            border-top: 1px solid #ddd;
            padding-top: 20px;
        }

        .info-contacto p{
            margin: 8px 0;
        }
    </style>

    <h2>🐾 Contáctanos</h2>

    <p>
        Tu apoyo puede cambiar la vida de un animal. Escríbenos para adoptar,
        reportar casos de maltrato o unirte como voluntario.
    </p>

    <form>
        <input type="text" placeholder="Tu nombre" required>

        <input type="email" placeholder="Tu correo electrónico" required>

        <input type="text" placeholder="Asunto" required>

        <textarea rows="5" placeholder="Escribe tu mensaje aquí..." required></textarea>

        <button type="submit">Enviar Mensaje</button>
    </form>

    <div class="info-contacto">
        <h3>📞 Información de Contacto</h3>
        <p>📍 Av. Protección Animal #123</p>
        <p>📱 +52 55 1234 5678</p>
        <p>✉️ contacto@proteccionanimal.org</p>
    </div>
</section>
